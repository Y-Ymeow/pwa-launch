<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Adapt 示例</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1e1e2e;
            color: #cdd6f4;
        }
        h1 { color: #89b4fa; }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            background: #313244;
        }
        .status.ready { background: #a6e3a1; color: #1e1e2e; }
        .status.error { background: #f38ba8; color: #1e1e2e; }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            background: #89b4fa;
            color: #1e1e2e;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #b4befe; }
        pre {
            background: #181825;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
        .image-test {
            margin: 20px 0;
        }
        .image-test img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🚀 PWA Container Adapt 示例</h1>
    
    <div id="status" class="status">等待 Tauri 桥接...</div>
    
    <h2>功能测试</h2>
    <button onclick="testProxyFetch()">测试代理请求</button>
    <button onclick="testOpfsWrite()">测试文件写入</button>
    <button onclick="testOpfsRead()">测试文件读取</button>
    
    <h2>图片代理测试</h2>
    <div class="image-test">
        <p>以下图片会自动通过代理加载：</p>
        <img src="https://picsum.photos/400/200" alt="测试图片1">
        <img src="https://picsum.photos/400/201" alt="测试图片2">
    </div>
    
    <h2>结果</h2>
    <pre id="result">点击上方按钮测试...</pre>

    <!-- 
    ============================================
    PWA Container Adapt 桥接脚本
    ============================================
    方式1：下载 adapt.js 到本地使用
    <script src="adapt.js"></script>
    
    方式2：使用 CDN（部署后）
    <script src="https://your-cdn.com/adapt.js"></script>
    -->
    <script src="adapt.js"></script>

    <script>
        // 更新状态显示
        function updateStatus(text, isReady) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.className = 'status ' + (isReady ? 'ready' : 'error');
        }

        // 显示结果
        function showResult(data) {
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }

        // 等待 tauri-ready 事件
        window.addEventListener('tauri-ready', () => {
            updateStatus('✅ Tauri 桥接已就绪！可以使用原生 API', true);
        });

        // 超时检测
        setTimeout(() => {
            if (!window.__TAURI__?._ready) {
                updateStatus('❌ 未在 PWA Container 中运行，或桥接初始化失败', false);
            }
        }, 3000);

        // 测试函数
        async function testProxyFetch() {
            try {
                const result = await window.__TAURI__.invoke('proxy_fetch', {
                    url: 'https://api.github.com/users/github',
                    method: 'GET',
                    headers: {},
                    body: null
                });
                showResult({ success: true, data: result });
            } catch (err) {
                showResult({ error: err.message });
            }
        }

        async function testOpfsWrite() {
            try {
                const result = await window.__TAURI__.invoke('opfs_write_file', {
                    path: 'test.txt',
                    data: 'Hello from PWA!'
                });
                showResult({ success: true, data: result });
            } catch (err) {
                showResult({ error: err.message });
            }
        }

        async function testOpfsRead() {
            try {
                const result = await window.__TAURI__.invoke('opfs_read_file', {
                    path: 'test.txt'
                });
                showResult({ success: true, data: result });
            } catch (err) {
                showResult({ error: err.message });
            }
        }
    </script>
</body>
</html>
