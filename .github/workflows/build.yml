# Linux 和 Android 构建工作流
name: Build Linux & Android

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  workflow_dispatch:

jobs:
  # Linux 构建 - 只构建 AppImage
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Linux App
        run: |
          npm run tauri build -- --no-bundle
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: target/release/bundle/appimage/*.AppImage

  # Android 构建 - Debug 版本（不需要 keystore）
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install Node dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Android Debug APK
        run: |
          cargo tauri android build --debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: |
            target/aarch64-linux-android/debug/*.apk
            target/armv7-linux-androideabi/debug/*.apk
            target/x86_64-linux-android/debug/*.apk
            target/i686-linux-android/debug/*.apk
