name: publish

on:
  push:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - run: bun run build
      - run: bunx tauri build

      - run: bunx tauri build

      - name: Create launcher script
        run: |
          cd src-tauri/target/release/bundle/appimage
          APPIMAGE=$(ls *.AppImage | head -1)
          cat > run.sh << EOF
          #!/bin/bash
          # 禁用 GPU/EGL 加速
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export WEBKIT_FORCE_SOFTWARE_RENDERING=1
          export LIBGL_ALWAYS_SOFTWARE=1
          exec ./"$APPIMAGE" "$@"
          EOF
          chmod +x run.sh
          tar czf "${APPIMAGE%.AppImage}.tar.gz" "$APPIMAGE" run.sh

      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: src-tauri/target/release/bundle/appimage/*.tar.gz

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - run: bun install
      - run: bun run build
      - run: bunx tauri android init || true

      - name: Disable hardware acceleration
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/<application/<application android:hardwareAccelerated="false"/' "$MANIFEST"
            cat "$MANIFEST"
          fi

      # 尝试构建 Release（带签名）
      - name: Build Android Release
        id: build_release
        run: |
          # 解码 keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          ls -la android.keystore
          
          # 设置签名环境变量
          export TAURI_ANDROID_SIGNING_KEYSTORE_PATH="$(pwd)/android.keystore"
          export TAURI_ANDROID_SIGNING_KEY_ALIAS="upload"
          export TAURI_ANDROID_SIGNING_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"
          export TAURI_ANDROID_SIGNING_KEYSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          
          echo "签名配置:"
          echo "  KEYSTORE_PATH: $TAURI_ANDROID_SIGNING_KEYSTORE_PATH"
          echo "  KEY_ALIAS: $TAURI_ANDROID_SIGNING_KEY_ALIAS"
          
          bunx tauri android build --target aarch64
        continue-on-error: true

      # 如果 Release 失败，构建 Debug
      - name: Build Android Debug
        if: steps.build_release.outcome == 'failure'
        run: |
          bunx tauri android build --target aarch64 --debug

      # 上传 Release APK
      - name: Upload Release APK
        if: steps.build_release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk

      # 上传 Debug APK
      - name: Upload Debug APK
        if: steps.build_release.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/debug/*.apk
