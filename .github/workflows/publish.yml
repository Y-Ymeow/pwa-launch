name: publish

on:
  push:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - run: bun run build
      - run: bunx tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - run: bun install
      - run: bun run build
      - run: bunx tauri android init || true

      - name: Disable hardware acceleration
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/<application/<application android:hardwareAccelerated="false"/' "$MANIFEST"
            cat "$MANIFEST"
          fi

      - run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore 2>/dev/null || true
          export TAURI_ANDROID_SIGNING_KEYSTORE_PATH=android.keystore
          export TAURI_ANDROID_SIGNING_KEY_ALIAS=upload
          export TAURI_ANDROID_SIGNING_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          export TAURI_ANDROID_SIGNING_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          bunx tauri android build --target aarch64 || bunx tauri android build --target aarch64 --debug
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
