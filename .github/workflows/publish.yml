name: publish

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: dtolnay/rust-toolchain@stable
      
      # 1. Rust 编译缓存
      - uses: Swatinem/rust-cache@v2
        with:
          work-directories: "src-tauri"

      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libmpv-dev mpv
      - run: bun install
      - run: bun run build:adapt
      - run: bun run build
      
      # 只生成二进制、DEB 和 RPM
      - run: bunx tauri build --bundles deb,rpm

      - name: Prepare Portable Linux Directory
        run: |
          mkdir -p release-out/pwa-container-portable
          BINARY_NAME="pwa-container"
          if [ -f "src-tauri/target/release/$BINARY_NAME" ]; then
            cp "src-tauri/target/release/$BINARY_NAME" release-out/pwa-container-portable/
            cd release-out
            tar czf pwa-container-linux-x64.tar.gz pwa-container-portable/
            rm -rf pwa-container-portable/
            cd ..
          fi
          find src-tauri/target/release/bundle -name "*.deb" -exec cp {} release-out/ \;
          find src-tauri/target/release/bundle -name "*.rpm" -exec cp {} release-out/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: release-out/*

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21 # 使用 Java 21 匹配本地环境
      
      # 1. Rust 编译缓存 (针对 Android 目标)
      - uses: Swatinem/rust-cache@v2
        with:
          work-directories: "src-tauri"

      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - run: bun install
      - run: bun run build:adapt
      - run: bun run build

      - name: Configure Android Signing
        run: |
          # 必须生成在 app 目录下，对齐 build.gradle.kts
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/app/release.keystore
          
          # 属性文件放在 gen/android 下
          echo "keyAlias=upload" > src-tauri/gen/android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> src-tauri/gen/android/key.properties
          echo "storeFile=release.keystore" >> src-tauri/gen/android/key.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> src-tauri/gen/android/key.properties

      - name: Build Android Release
        run: bunx tauri android build --target aarch64

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
