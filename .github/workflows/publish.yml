name: publish

on:
  push:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - run: bun run build
      - run: bunx tauri build

      - name: Prepare Linux Artifacts
        run: |
          mkdir -p release-out
          
          # 1. 提取原始二进制文件 (Portable Binary)
          # Tauri 2.0 默认二进制名通常是 package.json 中的 name 或 tauri.conf.json 中的 productName
          # 这里我们尝试查找并重命名为更友好的名称
          BINARY_PATH="src-tauri/target/release/pwa-container"
          if [ -f "$BINARY_PATH" ]; then
            cp "$BINARY_PATH" release-out/pwa-container-x86_64
            # 压缩为绿色版 tar.gz
            cd release-out
            tar czf pwa-container-linux-portable.tar.gz pwa-container-x86_64
            rm pwa-container-x86_64
            cd ..
          fi
          
          # 2. 收集 AppImage (虽然在某些系统有 EGL 问题，但仍保留作为备选)
          find src-tauri/target/release/bundle/appimage -name "*.AppImage" -exec cp {} release-out/ \;
          
          # 3. 收集 DEB 和 RPM (用户确认 RPM 没问题)
          find src-tauri/target/release/bundle -name "*.deb" -exec cp {} release-out/ \;
          find src-tauri/target/release/bundle -name "*.rpm" -exec cp {} release-out/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: release-out/*

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - run: bun install
      - run: bun run build

      # 构建 Android Release
      - name: Build Android Release
        id: build_release
        env:
          TAURI_ANDROID_SIGNING_KEY_ALIAS: "upload"
          TAURI_ANDROID_SIGNING_KEY_PASSWORD: "${{ secrets.ANDROID_KEY_PASSWORD }}"
          TAURI_ANDROID_SIGNING_KEYSTORE_PASSWORD: "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
        run: |
          # 确保 keystore 在工作目录
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          export TAURI_ANDROID_SIGNING_KEYSTORE_PATH="$(pwd)/android.keystore"
          
          echo "Keystore path check: $TAURI_ANDROID_SIGNING_KEYSTORE_PATH"
          ls -la android.keystore
          
          # 执行构建
          bunx tauri android build --target aarch64
        continue-on-error: true

      # 如果 Release 失败，构建 Debug (方便排查是否是签名问题)
      - name: Build Android Debug
        if: steps.build_release.outcome == 'failure'
        run: |
          bunx tauri android build --target aarch64 --debug

      # 上传 APK
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
