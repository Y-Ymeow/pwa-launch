name: publish

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - run: bun run build
      - run: bunx tauri build --bundles deb,rpm

      - name: Prepare Portable Linux Directory
        run: |
          mkdir -p release-out/pwa-container-portable
          BINARY_NAME="pwa-container"
          if [ -f "src-tauri/target/release/$BINARY_NAME" ]; then
            cp "src-tauri/target/release/$BINARY_NAME" release-out/pwa-container-portable/
            cd release-out
            tar czf pwa-container-linux-x64.tar.gz pwa-container-portable/
            rm -rf pwa-container-portable/
            cd ..
          fi
          find src-tauri/target/release/bundle -name "*.deb" -exec cp {} release-out/ \;
          find src-tauri/target/release/bundle -name "*.rpm" -exec cp {} release-out/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: release-out/*

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - run: bun install
      - run: bun run build

      # 直接生成签名配置文件，不再运行 init
      - name: Configure Android Signing
        run: |
          # 确保 keystore 所在目录存在
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/release.keystore
          
          cat > src-tauri/gen/android/key.properties << EOF
          keyAlias=upload
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EOF

      - name: Build Android Release
        run: |
          # 直接开始构建，系统会识别到已有的 gen/android 目录
          bunx tauri android build --target aarch64

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
